<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <title>{{TITLE_ZH}}</title>
  <meta name="description" content="{{META_DESCRIPTION}}" />
  <link rel="stylesheet" href="./style.css" />
  <script>
    (function () {
      try {
        var savedTheme = localStorage.getItem("resume-theme");
        var theme = savedTheme
          || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light");
        document.documentElement.setAttribute("data-theme", theme);

        var savedLocale = localStorage.getItem("resume-locale");
        if (savedLocale === "en" || savedLocale === "zh") {
          document.documentElement.lang = savedLocale === "en" ? "en" : "zh-CN";
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div class="toolbar" id="toolbar">
    <div class="toolbar__left">
      <button id="toggle-lang" class="toolbar__btn toolbar__btn--lang" type="button" title="Switch to English" aria-label="Switch to English">En</button>
      <button id="toggle-theme" class="toolbar__btn" type="button" title="切换深色/浅色模式" aria-label="切换深色/浅色模式"></button>
    </div>
    <div class="toolbar__actions">
      <button id="export-pdf" class="toolbar__btn" type="button" title="导出为 PDF">导出 PDF</button>
      <button id="export-md" class="toolbar__btn" type="button" title="导出为 Markdown 文件">导出 Markdown</button>
    </div>
  </div>

  <main class="resume" id="resume">
    <div class="resume__panel" id="resume-zh" data-locale="zh" data-title="{{TITLE_ZH}}">{{RESUME_ZH}}</div>
    <div class="resume__panel" id="resume-en" data-locale="en" data-title="{{TITLE_EN}}" hidden>{{RESUME_EN}}</div>
  </main>

  <script src="./main.js"></script>
</body>
</html>
